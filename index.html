<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Оглавление: рассказы и игры">
    <title>Оглавление</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* === НАСТРОЙКИ СТИЛЯ (легко подстроить под ваши страницы) === */
        :root {
            --bg: #0c0c0f;               /* Фон: глубокая тень */
            --text: #b0b3b8;             /* Основной текст */
            --heading: #e2e0db;          /* Заголовки: мягкий свет */
            --link: #8a929a;             /* Ссылки */
            --link-hover: #d4d8dc;       /* Ссылки при наведении */
            --divider: #25252a;          /* Разделители */
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
            --container-max: 780px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 10%, #141418 0%, var(--bg) 60%);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 4rem 1.5rem;
        }

        .container {
            max-width: var(--container-max);
            width: 100%;
            animation: fadeIn 1.4s ease-out;
        }

        header { text-align: center; margin-bottom: 3.5rem; }
        h1 {
            font-family: var(--font-heading);
            font-size: 3rem;
            font-weight: 400;
            color: var(--heading);
            letter-spacing: 0.04em;
            margin-bottom: 0.4rem;
        }
        .subtitle {
            font-size: 0.95rem;
            color: var(--link);
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .section { margin-bottom: 3rem; }
        .section h2 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--heading);
            border-bottom: 1px solid var(--divider);
            padding-bottom: 0.6rem;
            margin-bottom: 1.4rem;
        }

        ul { list-style: none; }
        li { margin-bottom: 0.9rem; padding-left: 1.2rem; position: relative; }
        li::before {
            content: '·';
            position: absolute;
            left: 0;
            color: var(--divider);
            font-size: 1.2rem;
            line-height: 1.4;
        }
        a {
            color: var(--link);
            text-decoration: none;
            font-size: 1.1rem;
            position: relative;
            transition: color 0.3s ease;
            display: inline-block;
        }
        a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -3px;
            left: 0;
            background-color: var(--link-hover);
            transition: width 0.3s ease;
        }
        a:hover, a:focus-visible {
            color: var(--link-hover);
            outline: none;
        }
        a:hover::after, a:focus-visible::after { width: 100%; }

        footer {
            text-align: center;
            margin-top: 4rem;
            font-size: 0.85rem;
            color: #5a5d64;
            border-top: 1px solid var(--divider);
            padding-top: 1.5rem;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .section h2 { font-size: 1.3rem; }
            body { padding: 2.5rem 1rem; }
        }
    </style>
</head>
<body>
    <main class="container">
        <header>

            <p class="subtitle">Тихие истории и игры</p>
        </header>

        <nav class="toc">

        </footer>
    </main>
</body>
